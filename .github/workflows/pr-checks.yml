name: PR Checks

on:
  pull_request:
    branches: [ "main" ]

jobs:
  npm-ci:
    name: npm ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          
      - name: Run npm ci
        run: npm ci
